<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Latency Monitor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #30363d; padding: 2rem; border-radius: 8px; background-color: #161b22; max-width: 500px; }
        .code { color: #79c0ff; font-family: monospace; background: #010409; padding: 10px; border-radius: 4px; }
        .status-dot { height: 10px; width: 10px; background-color: #238636; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h3><span class="status-dot"></span> System Status: Online</h3>
        <p>This edge runtime is configured for <strong>API Header Optimization</strong> and <strong>Cross-Region Latency Testing</strong>.</p>
        <p>To test endpoint throughput, use the following integration:</p>
        <div class="code">
            GET /api/health
        </div>
        <p style="font-size: 0.8rem; color: #8b949e; margin-top: 20px;">Deployment ID: EDGE_B34_RUNNER</p>
    </div>
</body>
</html>
