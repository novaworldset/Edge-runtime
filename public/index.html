<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeOps | Advanced API Analytics</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; --success: #3fb950; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .status-dot { height: 10px; width: 10px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--success); }
        .metric { font-size: 2rem; font-weight: bold; margin: 10px 0; color: #fff; }
        .terminal { background: #010409; padding: 1.5rem; border-radius: 8px; font-family: monospace; border: 1px solid var(--border); line-height: 1.6; }
        .btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { opacity: 0.8; }
        #results { color: var(--success); margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold; font-size: 1.2rem; color: var(--accent);">EdgeOps Node Manager</div>
        <div style="font-size: 0.9rem;"><span class="status-dot"></span> Edge Clusters: Online</div>
    </header>
    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Local Edge Latency</h3>
                <div class="metric" id="latency">-- ms</div>
                <button class="btn" onclick="testSpeed()">Run Diagnostic</button>
            </div>
            <div class="card">
                <h3>Active Protocol</h3>
                <div class="metric">HTTP/3</div>
                <p style="font-size: 0.8rem; color: var(--text-secondary);">Enforced TLS 1.3 Security</p>
            </div>
        </div>
        <div class="card" style="margin-top: 2rem;">
            <h3>Edge API Integration Shell</h3>
            <div class="terminal">
                <div style="color: var(--accent);">$ curl -X GET "https://api.edgeops.io/v1/health"</div>
                <div id="results">Waiting for diagnostic sequence...</div>
            </div>
        </div>
    </div>
    <script>
        async function testSpeed() {
            const start = Date.now();
            const resEl = document.getElementById('results');
            resEl.innerText = "Scanning edge nodes...";
            try {
                await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                const duration = Date.now() - start;
                document.getElementById('latency').innerText = duration + "ms";
                resEl.innerText = "✓ Diagnostic complete. All headers sanitized. Processing time: " + duration + "ms";
            } catch (e) {
                resEl.innerText = "Error: Network unreachable.";
            }
        }
    </script>
</body>
</html>
